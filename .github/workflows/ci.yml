name: Validate Resume

on:
  pull_request:
  push:
    branches:
      - main
      - feat-latex-html-migration

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX and Python tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-plain-generic make4ht
          python3 -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Ensure generated files are committed
        run: git diff --exit-code -- index.html resume.css
